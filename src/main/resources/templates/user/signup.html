<!DOCTYPE html>
<htm xmlns:th="http://www.thymeleaf.org">

	<head>
		<meta charset="UTF-8">
		<title>会員登録</title>

		<link rel="stylesheet" th:href="@{/css/style.css}">
	</head>

	<body>
		<div class="signup-container">
			<h1>会員登録</h1>

			<form th:action="@{/signup}" th:object="${signupForm}" method="post">

				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

				<div>
					<label>名前</label>
					<input type="text" th:field="*{name}">

					<div class="error-message" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">
					</div>
				</div>
				<div>
					<label>メールアドレス</label>
					<input type="email" th:field="*{email}">

					<div class="error-message" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">
					</div>
				</div>
				<div>
					<label>パスワード</label>
					<input type="password" th:field="*{password}">

					<div class="error-message" th:if="${#fields.hasErrors('password')}"
						th:text="${#fields.errors('password')[0]}">
					</div>
				</div>
				<button type="submit">登録</button>

			</form>
		</div>
	</body>

	</html>
