<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<link rel="stylesheet" th:href="@{/css/style.css}">
	<meta charset="UTF-8">
	<title>ログイン</title>
</head>

<body>
	<div th:if="${param.emailVerified}" class="success-message">
		メール認証が完了しました。ログインできます。
	</div>

	<div th:if="${param.passwordUpdated}" class="success-message">
		パスワードを変更しました
	</div>
	<div class="login-container">

		<h1>ログイン</h1>
		<!-- ログイン失敗時 -->
		<div th:if="${param.error}" class="error-message">
			メールアドレスまたはパスワードが違います
		</div>

		<!-- ログアウト後 -->
		<div th:if="${param.logout}" class="success-message">
			ログアウトしました
		</div>

		<!-- 会員登録成功 -->
		<div th:if="${param.signupSuccess}" class="success-message">
			会員登録しました
		</div>

		<form th:action="@{/login}" method="post">

			<div>
				<label>メールアドレス</label>
				<input type="text" name="username">
			</div>

			<div>
				<label>パスワード</label>
				<input type="password" name="password">
			</div>

			<button type="submit">ログイン</button>
		</form>

		<p>
			<a th:href="@{/password-reset}">パスワードをお忘れですか？</a>
		</p>

		<p>
			アカウントをお持ちでない方は
			<a th:href="@{/signup}">会員登録</a>
		</p>
	</div>
	
</body>

</html>
